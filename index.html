<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hunger Games Simulator</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 1rem; }
    textarea { width: 100%; height: 150px; }
    .hidden { display: none; }
    .tribute-list span { margin-right: 0.5rem; }
    .dead { text-decoration: line-through; color: #888; }
  </style>
</head>
<body>
  <h1>Hunger Games Simulator</h1>

  <section id="setup">
    <h2>Setup tributes</h2>
    <p>Enter one tribute per line. Optionally: <code>Name,District</code></p>
    <textarea id="tributeInput">Katniss,12
Peeta,12
Cato,2
Clove,2
Rue,11
Thresh,11</textarea>
    <br />
    <button id="startBtn">Start Simulation</button>
  </section>

  <section id="sim" class="hidden">
    <h2 id="phaseTitle">Bloodbath</h2>
    <button id="nextBtn">Next phase</button>

    <h3>Events</h3>
    <div id="log"></div>

    <h3>Tributes</h3>
    <div id="tributes" class="tribute-list"></div>
  </section>

  <script src="main.js"></script>
</body>
</html>
