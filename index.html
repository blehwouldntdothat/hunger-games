<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hunger Games Simulator</title>
  <style>
    body { font-family: sans-serif; max-width: 900px; margin: 0 auto; padding: 1rem; }
    .hidden { display: none; }
    .tribute-list { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .tribute {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      border: 1px solid #ddd;
      font-size: 0.9rem;
    }
    .tribute img {
      width: 40px;
      height: 40px;
      object-fit: cover;
      border-radius: 4px;
    }
    .dead { text-decoration: line-through; color: #888; opacity: 0.6; }
    #castForm div { margin-bottom: 8px; }
    #castForm input { margin-right: 4px; }
  </style>
</head>
<body>
  <h1>Hunger Games Simulator</h1>

  <!-- SETUP SECTION -->
  <section id="setup">
    <h2>Setup Cast</h2>

    <label for="castSize">Cast Size: <span id="castSizeLabel">10</span></label>
    <input type="range" id="castSize" min="2" max="48" value="10" />

    <button id="editCastBtn">Edit Cast</button>

    <div id="castEditor" class="hidden">
      <h3>Edit Cast</h3>
      <div id="castForm"></div>
      <button id="saveCastBtn">Save Cast</button>
    </div>

    <h3>Current Cast</h3>
    <ul id="castPreview"></ul>

    <button id="startBtn">Start Simulation</button>
  </section>

  <!-- SIMULATION SECTION -->
  <section id="sim" class="hidden">
    <h2 id="phaseTitle">Bloodbath</h2>
    <button id="nextBtn">Next phase</button>

    <h3>Events this phase</h3>
    <div id="log"></div>

    <h3>Tributes</h3>
    <div id="tributes" class="tribute-list"></div>
  </section>

  <script src="main.js"></script>
</body>
</html>
